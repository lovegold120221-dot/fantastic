# Orbit Meeting — Electron Builder Configuration
# Builds platform-specific installers from the Next.js standalone build.

appId: ai.eburon.orbit.meeting
productName: Orbit Meeting
copyright: Copyright © 2026 Eburon AI

directories:
  output: dist-electron
  buildResources: electron/assets

files:
  - electron/**/*
  - package.json

extraResources:
  - from: .next/standalone
    to: app
    filter:
      - "**/*"
      - "!**/*.map"
      - "!.next/node_modules/**"

# Next.js standalone puts server.js + .next at root
asar: true
asarUnpack:
  - "**/*.node"
  - ".next/server/**"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: electron/assets/icon.icns
  extendInfo:
    NSMicrophoneUsageDescription: "Orbit Meeting needs microphone access for meetings."
    NSCameraUsageDescription: "Orbit Meeting needs camera access for video meetings."
  # Signing identity — CI provides CSC_LINK + CSC_KEY_PASSWORD env vars.
  # For local builds without a cert, set identity to null to skip signing:
  #   CSC_IDENTITY_AUTO_DISCOVERY=false electron-builder --mac
  notarize:
    teamId: ${env.APPLE_TEAM_ID}
    # Uses APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD env vars for notarization

win:
  target:
    - target: nsis
      arch: [x64, arm64]
    - target: portable
      arch: [x64]
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
  icon: electron/assets/icon.ico

linux:
  category: Network
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  icon: electron/assets

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: electron/assets/icon.ico

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish: null
